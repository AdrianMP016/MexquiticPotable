<div class="modal fade" id="modalEstadoRutas" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-xl modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"><i class="fas fa-clipboard-check text-success mr-2"></i>Estado de verificacion por ruta</h5>
        <button type="button" class="close" data-dismiss="modal" aria-label="Cerrar">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>

      <div class="modal-body">
        <!-- Filtros -->
        <div class="form-row align-items-end mb-3">
          <div class="col-md-4 mb-2 mb-md-0">
            <label for="estadoRutasPeriodo" class="mb-1">Periodo bimestral</label>
            <select id="estadoRutasPeriodo" class="form-control">
              <option value="">Cargando periodos...</option>
            </select>
          </div>
          <div class="col-md-3 mb-2 mb-md-0">
            <label for="estadoRutasFiltroTexto" class="mb-1">Filtrar ruta</label>
            <input type="text" id="estadoRutasFiltroTexto" class="form-control" placeholder="Nombre o codigo...">
          </div>
          <div class="col-md-5 mt-2 mt-md-0 d-flex align-items-end">
            <button type="button" class="btn btn-success mr-2" id="btnCargarEstadoRutas">
              <i class="fas fa-search mr-1"></i> Consultar
            </button>
            <button type="button" class="btn btn-outline-secondary d-none" id="btnDescargarFaltantesTodas">
              <i class="fas fa-download mr-1"></i> CSV todos los faltantes
            </button>
          </div>
        </div>

        <!-- Resumen general -->
        <div id="estadoRutasResumen" class="d-none mb-3">
          <div class="row text-center">
            <div class="col-6 col-md-3 mb-2">
              <div class="info-box mb-0">
                <span class="info-box-icon bg-info"><i class="fas fa-home"></i></span>
                <div class="info-box-content">
                  <span class="info-box-text">Total medidores</span>
                  <span class="info-box-number" id="estadoRutasTotalMedidores">0</span>
                </div>
              </div>
            </div>
            <div class="col-6 col-md-3 mb-2">
              <div class="info-box mb-0">
                <span class="info-box-icon bg-success"><i class="fas fa-check-circle"></i></span>
                <div class="info-box-content">
                  <span class="info-box-text">Verificados</span>
                  <span class="info-box-number" id="estadoRutasVerificados">0</span>
                </div>
              </div>
            </div>
            <div class="col-6 col-md-3 mb-2">
              <div class="info-box mb-0">
                <span class="info-box-icon bg-warning"><i class="fas fa-exclamation-circle"></i></span>
                <div class="info-box-content">
                  <span class="info-box-text">Faltantes</span>
                  <span class="info-box-number" id="estadoRutasFaltantes">0</span>
                </div>
              </div>
            </div>
            <div class="col-6 col-md-3 mb-2">
              <div class="info-box mb-0">
                <span class="info-box-icon bg-primary"><i class="fas fa-percentage"></i></span>
                <div class="info-box-content">
                  <span class="info-box-text">Avance general</span>
                  <span class="info-box-number" id="estadoRutasPorcentaje">0%</span>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Tabla por ruta -->
        <div id="estadoRutasTablaWrap" class="d-none">
          <div class="table-responsive">
            <table class="table table-hover table-sm mb-0" id="tablaEstadoRutas">
              <thead class="thead-light">
                <tr>
                  <th>Ruta</th>
                  <th class="text-center">Total</th>
                  <th class="text-center">Verificados</th>
                  <th class="text-center">Faltantes</th>
                  <th style="min-width:140px">Avance</th>
                  <th class="text-right">Acciones</th>
                </tr>
              </thead>
              <tbody id="tablaEstadoRutasTbody"></tbody>
            </table>
          </div>
          <div class="text-center text-muted py-2 d-none" id="estadoRutasSinResultados">
            <small>Ninguna ruta coincide con el filtro.</small>
          </div>
        </div>

        <!-- Estados vacío / cargando -->
        <div id="estadoRutasVacio" class="text-center text-muted py-5">
          <i class="fas fa-search fa-2x mb-2"></i><br>
          Selecciona un periodo y haz clic en <strong>Consultar</strong>.
        </div>
        <div id="estadoRutasCargando" class="text-center py-5 d-none">
          <i class="fas fa-spinner fa-spin fa-2x text-primary mb-2"></i><br>
          <span class="text-muted">Consultando...</span>
        </div>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" data-dismiss="modal">Cerrar</button>
      </div>
    </div>
  </div>
</div>
