<div class="modal fade" id="modalResetSistemaPassword" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <form id="formResetSistemaPassword">
        <input type="hidden" name="accion" value="usuariosSistema.resetPassword">
        <input type="hidden" name="usuario_sistema_id" id="resetSistemaUsuarioId">
        <div class="modal-header">
          <h5 class="modal-title"><i class="fas fa-key text-primary mr-2"></i>Restablecer contrasena</h5>
          <button type="button" class="close" data-dismiss="modal" aria-label="Cerrar">
            <span aria-hidden="true">&times;</span>
          </button>
        </div>
        <div class="modal-body">
          <div class="alert alert-dismissible d-none" id="modalResetSistemaFeedback" role="alert">
            <button type="button" class="close" data-dismiss="alert" aria-hidden="true">&times;</button>
            <span id="modalResetSistemaFeedbackText"></span>
          </div>
          <p class="text-muted mb-3">Define una nueva contrasena para <strong id="resetSistemaUsuarioNombre">esta cuenta</strong>.</p>
          <div class="form-group">
            <label for="resetSistemaPassword">Nueva contrasena</label>
            <input type="password" class="form-control" id="resetSistemaPassword" name="password" maxlength="80" required>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" data-dismiss="modal">Cerrar</button>
          <button type="submit" class="btn btn-primary">
            <i class="fas fa-key mr-1"></i> Restablecer
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
