    <section class="content app-view d-none" id="viewPagos">
      <div class="container-fluid">
        <div class="row">
          <div class="col-12">
            <div class="alert alert-dismissible d-none" id="pagosFeedback" role="alert">
              <button type="button" class="close" data-dismiss="alert" aria-hidden="true">&times;</button>
              <span id="pagosFeedbackText"></span>
            </div>

            <div class="card search-card">
              <div class="card-body">
                <div class="row align-items-end">
                  <div class="col-md-4">
                    <label for="buscarPagoUsuario">Buscar usuario, ruta o medidor</label>
                    <div class="input-group">
                      <div class="input-group-prepend">
                        <span class="input-group-text"><i class="fas fa-search"></i></span>
                      </div>
                      <input type="text" id="buscarPagoUsuario" class="form-control text-uppercase-field" maxlength="180" placeholder="NOMBRE, RUTA O MEDIDOR">
                    </div>
                  </div>
                  <div class="col-md-4 mt-3 mt-md-0">
                    <label for="selectUsuarioPago">Seleccionar usuario</label>
                    <select id="selectUsuarioPago" class="form-control">
                      <option value="">Todos los usuarios</option>
                    </select>
                  </div>
                  <div class="col-md-2 mt-3 mt-md-0">
                    <button type="button" class="btn btn-primary btn-block" id="btnBuscarUsuarioPago">
                      <i class="fas fa-search mr-1"></i> Buscar
                    </button>
                  </div>
                  <div class="col-md-2 mt-3 mt-md-0">
                    <button type="button" class="btn btn-outline-primary btn-block" id="btnRecargarPagos">
                      <i class="fas fa-sync-alt mr-1"></i> Recargar
                    </button>
                  </div>
                </div>
              </div>
            </div>

            <div class="card">
              <div class="card-header">
                <h3 class="card-title"><i class="fas fa-cash-register mr-2"></i>Recibos para registrar pago</h3>
              </div>
              <div class="card-body p-0">
                <div class="table-responsive">
                  <table class="table table-hover table-striped mb-0" id="tablaPagosRecibos">
                    <thead>
                      <tr>
                        <th>Folio / Usuario</th>
                        <th>Periodo</th>
                        <th>Entrega</th>
                        <th>Estatus</th>
                        <th class="text-right">Acciones</th>
                      </tr>
                    </thead>
                    <tbody>
                      <tr>
                        <td colspan="5" class="text-center text-muted py-4">Cargando recibos del sistema...</td>
                      </tr>
                    </tbody>
                  </table>
                </div>
                <div class="users-pagination-footer">
                  <div class="users-pagination-left">
                    <div class="users-pagination-meta" id="pagosResumenPaginacionInferior"></div>
                    <div class="users-length-control">
                      <label for="pagosPorPagina" class="mb-0">Mostrar</label>
                      <select id="pagosPorPagina" class="form-control form-control-sm">
                        <option value="25" selected>25</option>
                        <option value="30">30</option>
                        <option value="50">50</option>
                        <option value="75">75</option>
                        <option value="100">100</option>
                        <option value="0">Todos</option>
                      </select>
                    </div>
                  </div>
                  <div class="btn-group btn-group-sm" role="group" aria-label="Paginacion de pagos">
                    <button type="button" class="btn btn-outline-primary" id="btnPagosAnterior">
                      <i class="fas fa-chevron-left mr-1"></i> Anterior
                    </button>
                    <button type="button" class="btn btn-outline-primary" id="btnPagosSiguiente">
                      Siguiente <i class="fas fa-chevron-right ml-1"></i>
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
