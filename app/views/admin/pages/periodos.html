    <section class="content app-view d-none" id="viewPeriodos">
      <div class="container-fluid">
        <div class="row">
          <div class="col-12">
            <div class="alert alert-dismissible d-none" id="periodosFeedback" role="alert">
              <button type="button" class="close" data-dismiss="alert" aria-hidden="true">&times;</button>
              <span id="periodosFeedbackText"></span>
            </div>

            <div class="card search-card">
              <div class="card-body">
                <div class="d-flex flex-column flex-md-row align-items-md-center justify-content-between">
                  <div>
                    <label class="mb-1">Periodos bimestrales de cobro</label>
                    <p class="mb-0 text-muted">Administra los rangos de fechas para generar cobros de agua cada dos meses.</p>
                  </div>
                  <div class="mt-3 mt-md-0">
                    <button type="button" class="btn btn-primary" id="btnAgregarPeriodo">
                      <i class="fas fa-plus mr-1"></i> Agregar periodo
                    </button>
                    <button type="button" class="btn btn-outline-primary ml-md-2 mt-2 mt-md-0" id="btnRecargarPeriodos">
                      <i class="fas fa-sync-alt mr-1"></i> Recargar
                    </button>
                  </div>
                </div>
              </div>
            </div>

            <div class="card">
              <div class="card-header">
                <h3 class="card-title"><i class="fas fa-calendar-alt mr-2"></i>Periodos registrados</h3>
              </div>
              <div class="card-body p-0">
                <div class="table-responsive">
                  <table class="table table-hover table-striped mb-0" id="tablaPeriodos">
                    <thead>
                      <tr>
                        <th>Periodo</th>
                        <th>Inicio</th>
                        <th>Fin</th>
                        <th>Bimestre</th>
                        <th>Estado</th>
                        <th class="text-right">Acciones</th>
                      </tr>
                    </thead>
                    <tbody>
                      <tr>
                        <td colspan="6" class="text-center text-muted py-4">Cargando periodos...</td>
                      </tr>
                    </tbody>
                  </table>
                </div>
                <div class="users-pagination-footer">
                  <div class="users-pagination-left">
                    <div class="users-pagination-meta" id="periodosResumenPaginacionInferior"></div>
                    <div class="users-length-control">
                      <label for="periodosPorPagina" class="mb-0">Mostrar</label>
                      <select id="periodosPorPagina" class="form-control form-control-sm">
                        <option value="25" selected>25</option>
                        <option value="30">30</option>
                        <option value="50">50</option>
                        <option value="75">75</option>
                        <option value="100">100</option>
                        <option value="0">Todos</option>
                      </select>
                    </div>
                  </div>
                  <div class="btn-group btn-group-sm" role="group" aria-label="Paginacion de periodos">
                    <button type="button" class="btn btn-outline-primary" id="btnPeriodosAnterior">
                      <i class="fas fa-chevron-left mr-1"></i> Anterior
                    </button>
                    <button type="button" class="btn btn-outline-primary" id="btnPeriodosSiguiente">
                      Siguiente <i class="fas fa-chevron-right ml-1"></i>
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
